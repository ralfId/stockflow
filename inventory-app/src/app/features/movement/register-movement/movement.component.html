<form [formGroup]="movementForm" (ngSubmit)="onSubmit()">
  <div class="space-y-12 m-12">
    <div class="border-b border-gray-900/10 pb-2">
      <h2 class="text-base/7 font-semibold text-gray-900">Crear movimientos</h2>
    </div>
    <div class="border-b border-gray-900/10 pb-3">
      <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-6">

        <!-- poducto -->
        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Selecciona un producto</span>
            </div>
            <select formControlName="productId" class="select select-bordered">
              <option [ngValue]="null" disabled selected>Seleccionar</option>
              <option *ngFor="let prod of products()" [ngValue]="prod.id">
                {{ prod.name }}
              </option>
            </select>
          </label>
          <span *ngIf="movementForm.get('productId')?.invalid && movementForm.get('productId')?.touched"
            class="mt-9 text-sm text-red-600 font-medium">
            Debes seleccionar un producto.
          </span>
        </div>

        <!-- categoria -->
        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Categoria</span>
            </div>
            <input type="text" formControlName="category" [disabled]=true placeholder="Categoria del producto"
              class="input input-bordered w-full max-w-xs" />
          </label>
        </div>

        <!-- stock minimo -->
        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Stock minimo</span>
            </div>
            <input type="text" formControlName="minStock" [disabled]=true placeholder="Stock minimo requerido"
              class="input input-bordered w-full max-w-xs" />
          </label>
        </div>

        <!-- stock actual -->
        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Stock actual</span>
            </div>
            <input type="text" formControlName="currentStock" [disabled]=true placeholder="Stock actual"
              class="input input-bordered w-full max-w-xs" />
          </label>
        </div>

        <!-- tipo de movimiento -->
        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Tipo de movimiento</span>
            </div>
            <div class="flex gap-16 mt-2">
              <div class="flex items-center">
                <input type="radio" formControlName="movementType" value="IN" class="radio radio-success"
                  id="entrada" />
                <label for="entrada" class="select-none ms-2 text-sm font-medium text-heading">Entrada</label>
              </div>
              <div class="flex items-center">
                <input type="radio" formControlName="movementType" value="OUT" class="radio radio-error" id="salida" />
                <label for="salida" class="select-none ms-2 text-sm font-medium text-heading">Salida</label>
              </div>
            </div>
          </label>
          <span *ngIf="movementForm.get('movementType')?.invalid && movementForm.get('movementType')?.touched"
            class="mt-3 text-sm text-red-600 font-medium">
            Debes seleccionar el tipo de movimiento.
          </span>
        </div>

        <!-- cantidad a mover -->
        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Cantidad a mover</span>
            </div>
            <input type="number" formControlName="quantity" placeholder="Cantidad"
              class="input input-bordered w-full max-w-xs" />
          </label>
          <div *ngIf="movementForm.get('quantity')?.invalid && movementForm.get('quantity')?.touched">
            <span *ngIf="movementForm.get('quantity')?.errors?.['required']"
              class="mt-9 text-sm text-red-600 font-medium">
              La cantidad es obligatoria.
            </span>
            <span *ngIf="movementForm.get('quantity')?.errors?.['min']" class="mt-9 text-sm text-red-600 font-medium">
              La cantidad debe ser al menos 1.
            </span>
          </div>
        </div>

        <!-- razon del movimiento -->
        <div class="col-span-full">
          <label class="form-control">
            <div class="label">
              <span class="label-text">Razon movimiento</span>
            </div>
            <textarea formControlName="reason" class="textarea textarea-bordered h-24"
              placeholder="Describir la razón del movimiento"></textarea>
          </label>
          <span *ngIf="movementForm.get('reason')?.invalid && movementForm.get('reason')?.touched"
            class="mt-9 text-sm text-red-600 font-medium">
            La razón es obligatoria.
          </span>
        </div>
      </div>
    </div>

    <!-- Botones -->
    <div class="mt-6 flex items-center justify-end gap-x-6">
      <button type="button" (click)="onCancel()" class="text-sm/6 font-semibold text-gray-900">Cancelar</button>
      <button type="submit" [disabled]="movementForm.invalid || isSubmitting()"
        class="rounded-md bg-cyan-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-cyan-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-500">
        {{ isSubmitting() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </div>
</form>
