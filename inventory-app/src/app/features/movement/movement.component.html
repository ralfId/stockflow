<form>
  <div class="space-y-12 m-12">
    <div class="border-b border-gray-900/10 pb-2">
      <h2 class="text-base/7 font-semibold text-gray-900">Crear movimientos</h2>
      <!-- <p class="mt-1 text-sm/6 text-gray-600">Crear movimientos para stock de productos</p> -->
    </div>
    <div class="border-b border-gray-900/10 pb-3">
      <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-6 sm:grid-cols-6">

        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Selecciona un producto</span>
              <!-- <span class="label-text-alt">Alt label</span> -->
            </div>
            <select class="select select-bordered">
              <option disabled selected>Seleccionar</option>
              <option>Producto 1</option>
              <option>Producto 2</option>
              <option>Producto 4</option>
              <option>Producto 5</option>
            </select>
          </label>
          <span class="mt-9 text-sm text-red-600 font-medium">Error de validacion.</span>
        </div>

        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Categoria</span>
              <!-- <span class="label-text-alt">Top Right label</span> -->
            </div>
            <input type="text" disabled placeholder="Categoria del producto"
              class="input input-bordered w-full max-w-xs" />
          </label>
        </div>

        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Stock minimo</span>
              <!-- <span class="label-text-alt">Top Right label</span> -->
            </div>
            <input type="text" disabled placeholder="Stock minimo requerido"
              class="input input-bordered w-full max-w-xs" />
          </label>
        </div>

        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Stock actual</span>
              <!-- <span class="label-text-alt">Top Right label</span> -->
            </div>
            <input type="text" disabled placeholder="Stock actual" class="input input-bordered w-full max-w-xs" />
          </label>
        </div>

        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Tipo de movimiento</span>
            </div>
            <div class="flex gap-16 mt-2">
              <div class="flex items-center">
                <input type="radio" name="radio-5" class="radio radio-success" checked="checked" />
                <label for="link-radio" class="select-none ms-2 text-sm font-medium text-heading">Entrada</label>
              </div>

              <div class="flex items-center">
                <input type="radio" name="radio-8" class="radio radio-error" checked="checked" />
                <label for="link-radio" class="select-none ms-2 text-sm font-medium text-heading">Entrada</label>
              </div>
            </div>
            <span class="mt-3 text-sm text-red-600 font-medium">Error de validacion.</span>
          </label>
        </div>

        <div class="sm:col-span-3">
          <label class="form-control w-full max-w-xs">
            <div class="label">
              <span class="label-text">Cantidad a mover</span>
            </div>
            <input type="number" placeholder="Stock actual" class="input input-bordered w-full max-w-xs" />
          </label>
          <span class="mt-9 text-sm text-red-600 font-medium">Error de validacion.</span>
        </div>

        <div class="col-span-full">
          <label class="form-control">
            <div class="label">
              <span class="label-text">Razon movimiento</span>
            </div>
            <textarea class="textarea textarea-bordered h-24" placeholder="Describir la razon de movimiento"></textarea>
          </label>
          <span class="mt-9 text-sm text-red-600 font-medium">Error de validacion.</span>
        </div>
      </div>
    </div>

    <div class="mt-6 flex items-center justify-end gap-x-6">
      <button type="button" class="text-sm/6 font-semibold text-gray-900">Cancel</button>
      <button type="submit"
        class="rounded-md bg-cyan-600  px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-cyan-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-500">Save</button>
    </div>
  </div>
</form>
